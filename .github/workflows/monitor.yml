name: 共用施設 空き自動予約

on:
  workflow_dispatch:         # 外部cron（cron-job.org）または手動で実行

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      # 前回の状態ファイルをキャッシュから復元（重複通知を防ぐため）
      - name: 前回の状態を復元
        uses: actions/cache@v5
        with:
          path: miwa_state.json
          key: miwa-state-${{ github.run_id }}
          restore-keys: |
            miwa-state-

      - name: 空き状況チェック＆自動予約
        run: python miwa_monitor.py
        env:
          MIWA_BASE_URL: ${{ secrets.MIWA_BASE_URL }}
          MIWA_FACILITY_ID: ${{ secrets.MIWA_FACILITY_ID }}
          
          MIWA_USER_ID: ${{ secrets.MIWA_USER_ID }}
          MIWA_PASSWORD: ${{ secrets.MIWA_PASSWORD }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
